<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion Example</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .accordion-header::after {
            content: '\25B6'; /* Change this to your desired chevron icon */
            float: right;
            transition: transform 0.2s ease;
        }

        .accordion-header.active::after {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <div class="accordion">
        <div class="accordion-item">
            <div class="accordion-header">Header 1</div>
            <div class="accordion-content">Content 1</div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header">Header 2</div>
            <div class="accordion-content">Content 2</div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header">Header 3</div>
            <div class="accordion-content">Content 3</div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
